<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GFM 语法 · Cherry Markdown Next</title>
    <link rel="stylesheet" href="../styles.css" />
    <link rel="stylesheet" href="../syntax-demo.css" />
    <link rel="stylesheet" href="../cherry.scss" />
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <h1>GFM 语法</h1>
        <p class="sub">
          <a href="../index.html">返回入口</a>
        </p>
        <p class="sub">
          内置 GFM 解析器（无 Cherry 扩展）。左侧选择语法演示。
        </p>
        <div class="toolbar">
          <button id="rerun-btn" type="button">重新渲染</button>
        </div>
        <p id="status" class="gfm-status"></p>
        <div id="syntax-list" class="syntax-list"></div>
      </aside>
      <main class="main extends-main">
        <textarea id="markdown-input" placeholder="输入 Markdown..."></textarea>
        <div class="extends-panels">
          <section class="extends-panel">
            <h2>预览</h2>
            <div class="body preview cherry" id="preview"></div>
          </section>
          <section class="extends-panel">
            <h2>Markdown / HTML</h2>
            <div class="body">
              <pre id="markdown-display"></pre>
              <hr style="border: none; border-top: 1px solid #e5e7eb; margin: 12px 0;" />
              <pre id="html-display"></pre>
            </div>
          </section>
        </div>
      </main>
    </div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
