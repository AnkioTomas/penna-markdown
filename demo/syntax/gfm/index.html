<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GFM 语法演示 · Cherry Markdown</title>
    <style>
      .layout { display: flex; height: 100%; flex: 1; overflow: hidden; background: #fff; }
      .sidebar { width: 240px; background: #f9fafb; border-right: 1px solid #e5e7eb; overflow-y: auto; }
      .menu-item { padding: 12px 16px; cursor: pointer; color: #4b5563; font-size: 14px; border-bottom: 1px solid #f3f4f6; transition: background 0.2s; }
      .menu-item:hover { background: #f3f4f6; }
      .menu-item.active { background: #eff6ff; color: #2563eb; font-weight: 600; border-right: 3px solid #2563eb; }
      
      .content { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
      .panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; border-bottom: 1px solid #e5e7eb; }
      .panel:last-child { border-bottom: none; }
      .panel-title { padding: 8px 16px; background: #f3f4f6; font-size: 13px; font-weight: 600; color: #4b5563; flex-shrink: 0; border-bottom: 1px solid #e5e7eb; }
      .panel-body { flex: 1; padding: 20px; overflow: auto; margin: 0; }
      
      pre#source-preview { font-family: ui-monospace, SFMono-Regular, Consolas, monospace; font-size: 14px; line-height: 1.5; color: #374151; white-space: pre-wrap; background: #fafafa; }
    </style>
  </head>
  <body>
    <div class="header">
      <a class="back" href="../../index.html">返回入口</a>
      <div class="title">GFM 语法演示</div>
    </div>
    <div class="layout">
      <div class="sidebar" id="menu-list">
        <!-- 菜单自动生成 -->
      </div>
      <div class="content">
        <div class="panel">
          <div class="panel-title">Markdown 源码</div>
          <pre id="source-preview" class="panel-body"></pre>
        </div>
        <div class="panel">
          <div class="panel-title">渲染效果</div>
          <div id="html-preview" class="panel-body cherry-render"></div>
        </div>
      </div>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
