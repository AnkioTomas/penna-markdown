<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>转换器 · Cherry Markdown Next</title>
    <link rel="stylesheet" href="./styles.css" />
    <link rel="stylesheet" href="../cherry.scss" />
  </head>
  <body>
    <div class="header">
      <a class="back" href="../index.html">返回入口</a>
      <div class="title">转换器</div>
    </div>

    <div class="layout">
      <div class="panel">
        <div class="panel-title">Markdown 输入</div>
        <textarea id="markdown" class="textarea"></textarea>
        <button id="reset-btn" type="button" class="btn">
          恢复示例
        </button>
      </div>

      <div class="panel">
        <div class="panel-title">HTML 输出 & 预览</div>
        <div class="split">
          <pre id="html-output" class="code"></pre>
          <div id="preview" class="preview cherry"></div>
        </div>
      </div>
    </div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
