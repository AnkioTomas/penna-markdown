<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GFM 官方用例测试 · Cherry Markdown Next</title>
    <link rel="stylesheet" href="../styles.css" />
    <link rel="stylesheet" href="../style/style.css" />
  </head>
  <body>
    <script src="../shared/require-server.js"></script>
    <div class="layout">
      <aside class="sidebar">
        <h1>GFM 官方用例</h1>
        <p class="sub">
          <a href="../index.html">返回入口</a>
        </p>
        <p class="sub">
          来源
          <a href="https://github.github.com/gfm/" target="_blank" rel="noreferrer"
            >github.github.com/gfm</a
          >
          · cmark-gfm spec.txt
        </p>
        <div class="summary">
          <span id="summary-total">共 0 项</span>
          <span id="summary-pass" class="pass">通过 0</span>
          <span id="summary-fail">失败 0</span>
          <span id="summary-skip">显示 0/0</span>
        </div>
        <div class="toolbar">
          <button id="rerun-btn" type="button">重新渲染</button>
        </div>
        <label class="filter-label">
          结果
          <select id="status-filter">
            <option value="">全部</option>
            <option value="fail">仅失败</option>
            <option value="pass">仅通过</option>
          </select>
        </label>
        <label class="filter-label">
          章节
          <select id="section-filter"></select>
        </label>
        <label class="filter-label">
          搜索
          <input id="filter" type="search" placeholder="例号 / 章节 / markdown" />
        </label>
        <p id="status" class="gfm-status"></p>
        <nav id="nav"></nav>
      </aside>
      <main class="main">
        <div id="cases"></div>
      </main>
    </div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
