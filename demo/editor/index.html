<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>编辑器 · Cherry Markdown Next</title>
    <link rel="stylesheet" href="../cherry.scss" />
    <link rel="stylesheet" href="../cherry-editor.scss" />
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; height: 100%; }
      body { display: flex; flex-direction: column; }
      .header {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 12px 18px;
        background: #fff;
        border-bottom: 1px solid #e5e7eb;
        flex-shrink: 0;
      }
      .back { text-decoration: none; color: #2563eb; font-size: 13px; }
      .title { font-weight: 650; font-size: 14px; }
      .header-controls {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-left: auto;
        flex-wrap: wrap;
      }
      .header-controls label {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 13px;
        color: #4b5563;
      }
      .header-controls select {
        font: inherit;
        padding: 4px 8px;
        border: 1px solid #d1d5db;
        border-radius: 6px;
        background: #fff;
      }
      .theme-btn {
        font: inherit;
        font-size: 13px;
        padding: 4px 10px;
        border: 1px solid #d1d5db;
        border-radius: 6px;
        background: #fff;
        color: #374151;
        cursor: pointer;
      }
      .theme-btn:hover { background: #f9fafb; }
      .theme-btn[aria-pressed="true"] {
        background: #111827;
        border-color: #111827;
        color: #f9fafb;
      }
      body.demo-dark .header {
        background: #1f2937;
        border-bottom-color: #374151;
      }
      body.demo-dark .title { color: #f3f4f6; }
      body.demo-dark .header-controls label { color: #d1d5db; }
      body.demo-dark .header-controls select,
      body.demo-dark .theme-btn {
        background: #111827;
        border-color: #4b5563;
        color: #e5e7eb;
      }
      #cherry-editor { flex: 1; min-height: 0; }
    </style>
  </head>
  <body>
    <div class="header">
      <a class="back" href="../index.html">返回入口</a>
      <div class="title">编辑器</div>
      <div class="header-controls">
        <label>
          主题
          <select id="editor-theme-select" aria-label="选择渲染主题"></select>
        </label>
        <label>
          明暗
          <select id="editor-appearance-select" aria-label="选择明暗模式">
            <option value="light">浅色</option>
            <option value="dark">深色</option>
            <option value="auto">跟随系统</option>
          </select>
        </label>
        <button id="editor-theme-btn" type="button" class="theme-btn" aria-pressed="false">
          夜间模式
        </button>
        <label>
          示例文档
          <select id="editor-doc-select" aria-label="选择示例文档">
            <option value="test">test.md（完整）</option>
            <option value="simple">simple.md（精简）</option>
          </select>
        </label>
      </div>
    </div>
    <div id="cherry-editor"></div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
