<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AST 语法树 · Cherry Markdown Next</title>
  </head>
  <body>
    <div class="header">
      <a class="back" href="../../index.html">返回入口</a>
      <div class="title">AST 语法树</div>
      <div class="header-controls">
        <label>
          主题
          <select id="theme-select" aria-label="选择渲染主题"></select>
        </label>
        <label>
          明暗
          <select id="appearance-select" aria-label="选择明暗模式">
            <option value="light">浅色</option>
            <option value="dark">深色</option>
            <option value="auto">跟随系统</option>
          </select>
        </label>
        <div id="timing" class="ast-timing">— ms</div>
      </div>
    </div>

    <div class="ast-layout">
      <section class="ast-panel">
        <div class="ast-panel-head">Markdown 输入</div>
        <textarea
          id="markdown"
          class="ast-textarea"
          spellcheck="false"
        ></textarea>
        <footer class="ast-panel-foot">
          <label class="ast-doc-switch">
            <span>文档</span>
            <select id="doc-select" aria-label="切换示例文档">
              <option value="test">test.md — 完整演示</option>
              <option value="simple">simple.md — 语法速览</option>
            </select>
          </label>
          <span id="doc-label" class="ast-doc-label">docs/test.md</span>
        </footer>
      </section>

      <section class="ast-panel ast-panel-tree">
        <div class="ast-panel-head ast-panel-head-split">
          <span>语法树</span>
          <div class="ast-toolbar">
            <label class="ast-search">
              <input
                id="type-filter"
                type="search"
                placeholder="筛选 type"
                autocomplete="off"
              />
            </label>
            <div class="ast-btn-group" role="group" aria-label="展开深度">
              <button id="expand-depth-1" class="ast-btn" type="button">
                1 层
              </button>
              <button id="expand-depth-2" class="ast-btn active" type="button">
                2 层
              </button>
              <button id="expand-all" class="ast-btn" type="button">
                全部
              </button>
              <button id="collapse-all" class="ast-btn" type="button">
                折叠
              </button>
            </div>
          </div>
        </div>

        <div id="ast-tree" class="ast-tree"></div>

        <div class="ast-detail">
          <div class="ast-detail-head">
            <span>节点 JSON</span>
            <button id="copy-detail" class="ast-btn ast-btn-sm" type="button">
              复制
            </button>
          </div>
          <pre id="node-detail" class="ast-detail-body"></pre>
        </div>
      </section>
    </div>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
