<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>转换器 · Cherry Markdown Next</title>
  </head>
  <body>
    <div class="header">
      <a class="back" href="../../index.html">返回入口</a>
      <div class="title">转换器</div>
      <button id="theme-btn" type="button" class="theme-btn" aria-pressed="false">
        夜间模式
      </button>
      <div id="timing" class="timing" title="parse + render">— ms</div>
    </div>

    <div class="layout">
      <div class="panel">
        <div class="panel-title">Markdown 输入</div>
        <textarea id="markdown" class="textarea"></textarea>
        <button id="reset-btn" type="button" class="btn">
          恢复示例
        </button>
      </div>

      <div class="panel">
        <div class="panel-title">预览</div>
        <div id="preview-wrap" class="cherry-theme-default">
          <div id="preview" class="preview cherry-render"></div>
        </div>
      </div>
    </div>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
