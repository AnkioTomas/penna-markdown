<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GFM 全量测试 · Cherry Markdown</title>
  </head>
  <body>
    <div class="header">
      <a class="back" href="../../index.html">返回入口</a>
      <div class="title">GFM 全量测试</div>
      <div class="header-controls">
        <label>
          主题
          <select id="theme-select" aria-label="选择渲染主题"></select>
        </label>
        <label>
          明暗
          <select id="appearance-select" aria-label="选择明暗模式">
            <option value="light">浅色</option>
            <option value="dark">深色</option>
            <option value="auto">跟随系统</option>
          </select>
        </label>
      </div>
    </div>

    <div class="gfm-toolbar">
      <div class="gfm-summary">
        <span id="summary-pass" class="pass">通过 0</span>
        <span id="summary-fail" class="fail">失败 0</span>
        <span id="summary-skip" class="skip">显示 0/0</span>
        <span id="summary-total" class="total">GFM 共 0 例</span>
      </div>
      <div class="gfm-filters">
        <input
          id="filter"
          type="search"
          placeholder="搜索 example / 章节 / Markdown…"
        />
        <select id="section-filter" aria-label="章节筛选"></select>
        <select id="status-filter" aria-label="状态筛选">
          <option value="">全部状态</option>
          <option value="pass">仅通过</option>
          <option value="fail">仅失败</option>
        </select>
        <button id="rerun-btn" type="button">重新运行</button>
      </div>
      <div id="status" class="gfm-status">初始化…</div>
    </div>

    <div class="gfm-main">
      <nav id="nav" class="gfm-nav" aria-label="用例导航"></nav>
      <main id="cases" class="gfm-cases"></main>
    </div>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
