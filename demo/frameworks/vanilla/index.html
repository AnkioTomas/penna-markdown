<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vanilla JS · Cherry Markdown Next</title>
    <link rel="icon" href="/logo/favicon.ico" sizes="any" />
    <link
      rel="icon"
      type="image/png"
      href="/logo/favicon-32x32.png"
      sizes="32x32"
    />
    <link rel="apple-touch-icon" href="/logo/apple-touch-icon.png" />
  </head>
  <body>
    <div class="header">
      <a class="back" href="/demo/index.html">
        <img
          class="header-logo"
          src="/logo/favicon-32x32.png"
          width="20"
          height="20"
          alt=""
        />
        返回入口
      </a>
      <div class="title">Vanilla JS 集成演示</div>
      <div class="header-controls">
        <label>
          主题
          <select id="theme-select" aria-label="选择渲染主题"></select>
        </label>
        <label>
          明暗
          <select id="appearance-select" aria-label="选择明暗模式">
            <option value="light">浅色</option>
            <option value="dark">深色</option>
            <option value="auto">跟随系统</option>
          </select>
        </label>
      </div>
    </div>
    <div class="app-container" id="cherry-editor"></div>
    <script type="module">
      import "../../_common/layout.scss";
      import "../../_common/cherry-demo.scss";
      import { Cherry } from "@/editor/Cherry.js";
      import { setupThemeAndAppearance } from "../../_common/theme.js";
      import { fetchDocContent } from "../../_common/api.js";

      const mount = document.getElementById("cherry-editor");
      const editor = new Cherry(mount, {
        editor: { value: await fetchDocContent("/docs/simple.md") },
      });
      setupThemeAndAppearance(editor);

      window.addEventListener("beforeunload", () => editor.destroy(), {
        once: true,
      });
    </script>
  </body>
</html>
