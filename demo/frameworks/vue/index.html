<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue 3 · Penna Markdown</title>
    <link rel="icon" href="../../../logo/favicon.ico" sizes="any" />
    <link
      rel="icon"
      type="image/png"
      href="../../../logo/favicon-32x32.png"
      sizes="32x32"
    />
    <link rel="apple-touch-icon" href="../../../logo/apple-touch-icon.png" />
  </head>
  <body>
    <div class="header">
      <a class="back" href="../../index.html">
        <img
          class="header-logo"
          src="../../../logo/favicon-32x32.png"
          width="20"
          height="20"
          alt=""
        />
        返回入口
      </a>
      <div class="title">Vue 3 集成演示</div>
      <div class="header-controls">
        <label>
          主题
          <select id="theme-select" aria-label="选择渲染主题"></select>
        </label>
        <label>
          明暗
          <select id="appearance-select" aria-label="选择明暗模式">
            <option value="light">浅色</option>
            <option value="dark">深色</option>
            <option value="auto">跟随系统</option>
          </select>
        </label>
      </div>
    </div>
    <div id="app" class="app-container"></div>
    <script type="module">
      import "../../_common/layout.scss";
      import "../../_common/penna-demo.scss";
      import { Penna } from "@/editor/Penna.js";
      import { setupThemeAndAppearance } from "../../_common/theme.js";
      import { fetchDocContent } from "../../_common/api.js";
      import {
        createApp,
        ref,
        onMounted,
        onBeforeUnmount,
        h,
      } from "https://unpkg.com/vue@3/dist/vue.esm-browser.js";

      createApp({
        setup() {
          const editorRef = ref(null);
          /** @type {import('@/editor/Penna.js').Penna | null} */
          let editor = null;

          onMounted(async () => {
            const el = editorRef.value;
            if (!el) return;
            editor = new Penna(el, {
              editor: { value: await fetchDocContent("/docs/simple.md") },
            });
            setupThemeAndAppearance(editor);
          });

          onBeforeUnmount(() => {
            editor?.destroy();
            editor = null;
          });

          return () =>
            h("div", {
              ref: editorRef,
              style: { flex: "1", minHeight: "0" },
            });
        },
      }).mount("#app");
    </script>
  </body>
</html>
